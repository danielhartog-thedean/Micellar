<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micellar — Collectie</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0a08;--surface:#161210;--surface2:#1e1814;--border:#2e2520;--gold:#c9a84c;--gold2:#e8c97a;--red:#8b2020;--red-light:#d4645a;--white-wine:#c8b97a;--rose:#d4807a;--sparkling:#8ab4cc;--sweet:#9a7ab4;--text:#e8e0d4;--text-muted:#7a6e64;--text-dim:#4a4038}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;min-height:100vh}
  header{background:linear-gradient(180deg,#0a0806 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:28px 32px 20px;display:flex;align-items:flex-end;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
  .header-title h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;letter-spacing:.08em;color:var(--gold);line-height:1}
  .header-title p{font-size:.7rem;letter-spacing:.2em;color:var(--text-muted);text-transform:uppercase;margin-top:4px}
  .header-stats{display:flex;gap:24px;align-items:flex-end}
  .stat{text-align:right}
  .stat-num{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--gold2);line-height:1}
  .stat-label{font-size:.65rem;letter-spacing:.15em;color:var(--text-muted);text-transform:uppercase}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);display:inline-block;margin-left:6px;vertical-align:middle;transition:background .4s}
  .sync-dot.syncing{background:var(--gold);animation:pulse .9s infinite}
  .sync-dot.ok{background:#6ab87a}
  .sync-dot.err{background:var(--red-light)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 32px}
  .tab{padding:14px 20px;cursor:pointer;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .2s}
  .tab:hover{color:var(--text)}.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
  main{padding:24px 32px;max-width:1400px;margin:0 auto}
  .controls{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
  .search-wrap{position:relative;flex:1;min-width:220px}
  .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 14px 10px 38px;font-family:'Jost',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s}
  .search-wrap input:focus{border-color:var(--gold)}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem}
  .filter-select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 14px;font-family:'Jost',sans-serif;font-size:.78rem;outline:none;cursor:pointer;min-width:150px}
  .filter-select:focus{border-color:var(--gold)}
  .results-count{font-size:.72rem;color:var(--text-muted);letter-spacing:.1em;white-space:nowrap}
  .wine-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border)}
  .wine-card{background:var(--surface);padding:18px 20px;cursor:pointer;transition:background .15s;position:relative;overflow:hidden}
  .wine-card:hover{background:var(--surface2)}
  .wine-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
  .wine-card.Rood::before{background:var(--red-light)}.wine-card.Wit::before{background:var(--white-wine)}.wine-card.Rosé::before{background:var(--rose)}.wine-card.Mousserend::before{background:var(--sparkling)}.wine-card.Zoet::before{background:var(--sweet)}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .wine-num{font-size:.65rem;color:var(--text-dim);letter-spacing:.1em;min-width:28px;padding-top:2px}
  .wine-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:400;line-height:1.25;color:var(--text);flex:1}
  .wine-year{font-size:.72rem;color:var(--gold);letter-spacing:.08em;white-space:nowrap}
  .wine-producer{font-size:.72rem;color:var(--text-muted);margin-top:4px;letter-spacing:.03em}
  .wine-region{font-size:.68rem;color:var(--text-dim);margin-top:2px}
  .card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .type-badge{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border:1px solid}
  .type-badge.Rood{color:var(--red-light);border-color:var(--red)}.type-badge.Wit{color:var(--white-wine);border-color:#7a6830}.type-badge.Rosé{color:var(--rose);border-color:#7a4038}.type-badge.Mousserend{color:var(--sparkling);border-color:#4a7490}.type-badge.Zoet{color:var(--sweet);border-color:#5a4070}
  .location-tag{font-size:.62rem;color:var(--text-dim);letter-spacing:.05em}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(5,3,2,.88);z-index:200;backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);max-width:580px;width:100%;max-height:88vh;overflow-y:auto;position:relative}
  .modal-accent{height:3px}
  .modal-accent.Rood{background:linear-gradient(90deg,var(--red),transparent)}.modal-accent.Wit{background:linear-gradient(90deg,var(--white-wine),transparent)}.modal-accent.Rosé{background:linear-gradient(90deg,var(--rose),transparent)}.modal-accent.Mousserend{background:linear-gradient(90deg,var(--sparkling),transparent)}.modal-accent.Zoet{background:linear-gradient(90deg,var(--sweet),transparent)}
  .modal-body{padding:28px 32px 32px}
  .modal-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2rem;line-height:1;transition:color .2s}
  .modal-close:hover{color:var(--text)}
  .modal-num{font-size:.65rem;color:var(--text-dim);letter-spacing:.12em}
  .modal-name{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;line-height:1.2;margin:4px 0 2px}
  .modal-producer{font-size:.82rem;color:var(--gold);letter-spacing:.05em}
  .modal-divider{border:none;border-top:1px solid var(--border);margin:18px 0}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .modal-field label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:3px}
  .modal-field span{font-size:.82rem;color:var(--text)}
  .modal-field.full{grid-column:1/-1}
  .modal-field.full span{font-size:.8rem;line-height:1.6;color:#b0a898}
  .modal-actions{display:flex;gap:10px;margin-top:24px}
  .btn-drink{flex:1;background:none;border:1px solid var(--red);color:var(--red-light);padding:11px;font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s}
  .btn-drink:hover{background:var(--red);color:var(--text)}
  .btn-close-modal{background:none;border:1px solid var(--border);color:var(--text-muted);padding:11px 20px;font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s}
  .btn-close-modal:hover{border-color:var(--text-muted);color:var(--text)}
  .add-form{background:var(--surface);border:1px solid var(--border);padding:28px 32px;max-width:700px}
  .form-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--gold);margin-bottom:24px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-field{display:flex;flex-direction:column;gap:6px}
  .form-field.full{grid-column:1/-1}
  .form-field label{font-size:.65rem;letter-spacing:.13em;text-transform:uppercase;color:var(--text-muted)}
  .form-field input,.form-field select,.form-field textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;font-family:'Jost',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s;resize:vertical}
  .form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--gold)}
  .form-field textarea{min-height:70px}
  .btn-add{margin-top:20px;background:var(--gold);color:var(--bg);border:none;padding:12px 28px;font-family:'Jost',sans-serif;font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:background .2s}
  .btn-add:hover{background:var(--gold2)}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--border);margin-bottom:24px}
  .stat-card{background:var(--surface);padding:20px 22px}
  .stat-card-num{font-family:'Cormorant Garamond',serif;font-size:2.4rem;color:var(--gold2);line-height:1}
  .stat-card-label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-top:4px}
  .chart-title{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px}
  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .bar-label{font-size:.75rem;width:160px;flex-shrink:0;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{flex:1;background:var(--surface2);height:6px}
  .bar-fill{height:100%;transition:width .6s ease}
  .bar-count{font-size:.72rem;color:var(--text-muted);width:28px;text-align:right}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  
  
  
  
  
  .confirm-actions{display:flex;gap:10px}
  
  
  
  
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);padding:12px 24px;font-size:.78rem;letter-spacing:.08em;color:var(--text);z-index:400;opacity:0;transition:opacity .3s;white-space:nowrap}
  .toast.show{opacity:1}
  .loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:500}
  .loading-screen h2{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--gold);font-weight:300;letter-spacing:.1em}
  .loading-bar{width:200px;height:2px;background:var(--border);position:relative;overflow:hidden}
  .loading-bar::after{content:'';position:absolute;left:-50%;width:50%;height:100%;background:var(--gold);animation:loading 1.2s infinite ease-in-out}
  @keyframes loading{0%{left:-50%}100%{left:150%}}
  .scan-zone{border:1px dashed var(--border);padding:28px;text-align:center;margin-bottom:20px;cursor:pointer;transition:all .2s;background:var(--surface2)}
  .scan-zone:hover{border-color:var(--gold);background:#1a1610}
  .scan-zone.drag-over{border-color:var(--gold);background:#1e1a10}
  .scan-zone-icon{font-size:2rem;margin-bottom:10px;opacity:.6}
  .scan-zone-text{font-size:.8rem;color:var(--text-muted);letter-spacing:.08em;line-height:1.7}
  .scan-zone-text strong{color:var(--gold);font-weight:400}
  .scan-btns{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
  .btn-scan{background:none;border:1px solid var(--border);color:var(--text-muted);padding:9px 20px;font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.13em;text-transform:uppercase;cursor:pointer;transition:all .2s}
  .btn-scan:hover{border-color:var(--gold);color:var(--gold)}
  .btn-scan.primary{border-color:var(--gold);color:var(--gold)}
  .btn-scan.primary:hover{background:var(--gold);color:var(--bg)}
  .scan-preview{max-width:180px;max-height:220px;object-fit:contain;border:1px solid var(--border);margin:0 auto 14px;display:block}
  .scan-status{font-size:.75rem;letter-spacing:.1em;color:var(--text-muted);margin-top:14px;min-height:20px}
  .scan-status.loading{color:var(--gold)}.scan-status.success{color:#6ab87a}.scan-status.error{color:var(--red-light)}
  
  @keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
  .form-divider{display:flex;align-items:center;gap:12px;margin:4px 0 18px;color:var(--text-dim);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase}
  .form-divider::before,.form-divider::after{content:'';flex:1;height:1px;background:var(--border)}
  @media(max-width:640px){header{flex-direction:column;gap:12px;align-items:flex-start;padding:16px 16px 12px}main{padding:16px}.tabs{padding:0 16px;overflow-x:auto}.wine-grid{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.modal-grid{grid-template-columns:1fr}}

  
  
  
  
  
  
  .login-field label{font-size:.62rem;letter-spacing:.13em;text-transform:uppercase;color:var(--text-muted)}
  .login-field input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;font-family:'Jost',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;width:100%}
  .login-field input:focus{border-color:var(--gold)}
  
  .login-btn:hover{background:var(--gold2)}
  
  .logout-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:6px 14px;font-family:'Jost',sans-serif;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-left:12px}
  .logout-btn:hover{border-color:var(--text-muted);color:var(--text)}

</style>
</head>
<body>



<div class="loading-screen" id="loading-screen">
  <h2>Micellar</h2>
  <div class="loading-bar"></div>
  <p style="font-size:.72rem;color:var(--text-muted);letter-spacing:.15em">Verbinden met collectie…</p>
</div>

<header>
  <div class="header-title">
    <h1>Micellar <span class="sync-dot" id="sync-dot" title="Verbindingsstatus"></span></h1>
    <p>Wijncollectie · lezen</p>
  </div>
  <div class="header-stats" style="align-items:flex-end">
    <div class="stat"><div class="stat-num" id="total-count">—</div><div class="stat-label">Wijnen</div></div>
    <div class="stat"><div class="stat-num" id="bottle-count">—</div><div class="stat-label">Flessen</div></div>
  
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('collectie')">Collectie</div>
  <div class="tab" onclick="switchTab('statistieken')">Statistieken</div>
</div>

<main>
  <div id="tab-collectie">
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="Zoek op naam, wijnhuis, regio…" oninput="filterWines()">
      </div>
      <select class="filter-select" id="filter-type" onchange="filterWines()">
        <option value="">Alle types</option><option value="Rood">Rood</option><option value="Wit">Wit</option><option value="Rosé">Rosé</option><option value="Mousserend">Mousserend</option><option value="Zoet">Zoet</option>
      </select>
      <select class="filter-select" id="filter-locatie" onchange="filterWines()">
        <option value="">Alle locaties</option><option value="Liebherr – Plank 1">Plank 1</option><option value="Liebherr – Plank 2">Plank 2</option><option value="Liebherr – Plank 3 (schuiflade)">Plank 3</option><option value="Liebherr – Plank 4">Plank 4</option><option value="Liebherr – Plank 5">Plank 5</option><option value="Liebherr – Plank 6">Plank 6</option><option value="Nog niet geplaatst">Niet geplaatst</option>
      </select>
      <span class="results-count" id="results-count"></span>
    </div>
    <div class="wine-grid" id="wine-grid"></div>
  </div>

  <div id="tab-statistieken" style="display:none">
    <div class="stats-grid" id="stats-cards"></div>
    <div class="two-col">
      <div><div class="chart-title">Verdeling per type</div><div id="chart-type"></div></div>
      <div><div class="chart-title">Verdeling per locatie</div><div id="chart-locatie"></div></div>
    </div>
    <div style="margin-top:28px"><div class="chart-title">Top regio's</div><div id="chart-regio"></div></div>
  </div>
</main>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-accent" id="modal-accent"></div>
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-body">
      <div class="modal-num" id="m-num"></div>
      <div class="modal-name" id="m-naam"></div>
      <div class="modal-producer" id="m-producer"></div>
      <hr class="modal-divider">
      <div class="modal-grid">
        <div class="modal-field"><label>Jaar</label><span id="m-jaar"></span></div>
        <div class="modal-field"><label>Type</label><span id="m-type"></span></div>
        <div class="modal-field full"><label>Regio</label><span id="m-regio"></span></div>
        <div class="modal-field full"><label>Druivenras</label><span id="m-druiven"></span></div>
        <div class="modal-field"><label>Locatie</label><span id="m-locatie"></span></div>
        <div class="modal-field"><label>Flessen</label><span id="m-flessen"></span></div>
        <div class="modal-field full"><label>Smaakprofiel</label><span id="m-smaak"></span></div>
        <div class="modal-field full"><label>Spijscombinaties</label><span id="m-spijs"></span></div>
      </div>
      <div class="modal-actions">
        <button class="btn-close-modal" onclick="closeModalDirect()">Sluiten</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let wines = [];
let pendingDrinkId = null;
let cameraStream = null;

// ── SUPABASE HELPERS ───────────────────────────────────────────────────
function sbHeaders() {
  return {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation'};
}

async function sbFetch(path, opts={}) {
  setSyncDot('syncing');
  try {
    const r = await fetch(SB_URL + '/rest/v1/' + path, {headers: sbHeaders(), ...opts});
    if (!r.ok) throw new Error(await r.text());
    const data = r.status === 204 ? null : await r.json();
    setSyncDot('ok');
    return data;
  } catch(e) {
    setSyncDot('err');
    throw e;
  }
}

function setSyncDot(state) {
  const d = document.getElementById('sync-dot');
  d.className = 'sync-dot ' + state;
}

// ── INIT ───────────────────────────────────────────────────────────────
async function init() {
  try {
    const data = await sbFetch('wijnen?select=*&order=volgorde.asc');
    if (data && data.length > 0) {
      wines = data;
    } else {
      // First run: seed the database with initial wines
      await seedDatabase();
    }
  } catch(e) {
    console.error('Supabase fout:', e);
    showToast('Verbindingsfout – lokale modus actief');
    wines = INITIAL_WINES;
  }
  document.getElementById('loading-screen').style.display = 'none';
  render();
}

async function seedDatabase() {
  showToast('Eerste keer: collectie wordt geüpload…');
  // Insert in batches of 20
  const batch = 20;
  for (let i = 0; i < INITIAL_WINES.length; i += batch) {
    await sbFetch('wijnen', {method: 'POST', body: JSON.stringify(INITIAL_WINES.slice(i, i+batch))});
  }
  wines = await sbFetch('wijnen?select=*&order=volgorde.asc');
  showToast('✓ ' + wines.length + ' wijnen geïmporteerd');
}

// ── RENDER ─────────────────────────────────────────────────────────────
function render() { updateStats(); renderGrid(); }

function updateStats() {
  document.getElementById('total-count').textContent = wines.length;
  document.getElementById('bottle-count').textContent = wines.reduce((s,w) => s+(parseInt(w.flessen)||1), 0);
}

function getTypeClass(type) {
  if (!type) return '';
  if (type.includes('Rood')) return 'Rood';
  if (type.includes('Wit')) return 'Wit';
  if (type.includes('Rosé')) return 'Rosé';
  if (type.includes('Mousserend')) return 'Mousserend';
  if (type.includes('Zoet')) return 'Zoet';
  return '';
}

const normalize = s => String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

function filterWines() { renderGrid(); }

function renderGrid() {
  const q = normalize(document.getElementById('search').value);
  const typeF = document.getElementById('filter-type').value;
  const locF = document.getElementById('filter-locatie').value;
  const filtered = wines.filter(w => {
    const matchQ = !q || [w.naam,w.wijnhuis,w.regio,w.druivenras,w.smaakprofiel,w.spijscombinaties].some(f => normalize(f).includes(q));
    const matchT = !typeF || (w.type && w.type.toLowerCase().includes(typeF.toLowerCase()));
    const matchL = !locF || w.locatie === locF;
    return matchQ && matchT && matchL;
  });
  document.getElementById('results-count').textContent = filtered.length + ' van ' + wines.length + ' wijnen';
  document.getElementById('wine-grid').innerHTML = filtered.map((w,i) => {
    const tc = getTypeClass(w.type);
    return `<div class="wine-card ${tc}" onclick="openModal(${w.id})">
      <div class="card-top">
        <span class="wine-num">#${i+1}</span>
        <div style="flex:1"><div class="wine-name">${w.naam}</div><div class="wine-producer">${w.wijnhuis||''}</div><div class="wine-region">${w.regio||''}</div></div>
        <span class="wine-year">${w.jaar||''}</span>
      </div>
      <div class="card-footer"><span class="type-badge ${tc}">${w.type||''}</span><span class="location-tag">${w.locatie||''}</span></div>
    </div>`;
  }).join('');
}

function openModal(id) {
  const w = wines.find(x => x.id === id);
  if (!w) return;
  const idx = wines.indexOf(w) + 1;
  const tc = getTypeClass(w.type);
  document.getElementById('modal-accent').className = 'modal-accent ' + tc;
  document.getElementById('m-num').textContent = '#' + idx;
  document.getElementById('m-naam').textContent = w.naam;
  document.getElementById('m-producer').textContent = w.wijnhuis||'';
  document.getElementById('m-jaar').textContent = w.jaar||'—';
  document.getElementById('m-type').textContent = w.type||'—';
  document.getElementById('m-regio').textContent = w.regio||'—';
  document.getElementById('m-druiven').textContent = w.druivenras||'—';
  document.getElementById('m-locatie').textContent = w.locatie||'—';
  document.getElementById('m-flessen').textContent = w.flessen||1;
  document.getElementById('m-smaak').textContent = w.smaakprofiel||'—';
  document.getElementById('m-spijs').textContent = w.spijscombinaties||'—';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-overlay').classList.remove('open'); }

// ── ADD WINE ───────────────────────────────────────────────────────────
async function addWine() {
  const naam = document.getElementById('f-naam').value.trim();
  if (!naam) { showToast('Vul minimaal een naam in.'); return; }
  const newWine = {
    naam, volgorde: wines.length + 1,
    wijnhuis: document.getElementById('f-wijnhuis').value.trim(),
    jaar: document.getElementById('f-jaar').value.trim(),
    regio: document.getElementById('f-regio').value.trim(),
    druivenras: document.getElementById('f-druivenras').value.trim(),
    flessen: parseInt(document.getElementById('f-flessen').value)||1,
    type: document.getElementById('f-type').value,
    locatie: document.getElementById('f-locatie').value,
    smaakprofiel: document.getElementById('f-smaak').value.trim(),
    spijscombinaties: document.getElementById('f-spijs').value.trim(),
  };
  try {
    const result = await sbFetch('wijnen', {method: 'POST', body: JSON.stringify(newWine)});
    if (result && result[0]) wines.push(result[0]);
    render();
    ['f-naam','f-wijnhuis','f-jaar','f-regio','f-druivenras','f-smaak','f-spijs'].forEach(id => document.getElementById(id).value='');
    document.getElementById('f-flessen').value = 1;
    document.getElementById('scan-preview-wrap').style.display = 'none';
    document.getElementById('scan-status').textContent = '';
    document.getElementById('scan-status').className = 'scan-status';
    showToast('"' + naam + '" toegevoegd aan collectie');
    switchTab('collectie');
  } catch(e) { showToast('Fout bij toevoegen: ' + e.message); }
}

// ── SCAN / CAMERA ──────────────────────────────────────────────────────
function onDragOver(e) { e.preventDefault(); document.getElementById('scan-zone').classList.add('drag-over'); }
function onDragLeave() { document.getElementById('scan-zone').classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('scan-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) processImageFile(file);
}
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) processImageFile(file);
  e.target.value = '';
}
function openCamera() {
  const modal = document.getElementById('camera-modal');
  modal.style.display = 'flex';
  navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}})
    .then(stream => { cameraStream = stream; document.getElementById('camera-video').srcObject = stream; })
    .catch(() => { closeCamera(); showToast('Camera niet beschikbaar'); });
}
function capturePhoto() {
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('camera-canvas');
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  closeCamera();
  canvas.toBlob(blob => processImageFile(blob), 'image/jpeg', 0.9);
}
function closeCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('camera-modal').style.display = 'none';
}
function processImageFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    document.getElementById('scan-preview').src = dataUrl;
    document.getElementById('scan-preview-wrap').style.display = 'block';
    analyzeLabel(dataUrl);
  };
  reader.readAsDataURL(file);
}
async function analyzeLabel(dataUrl) {
  const statusEl = document.getElementById('scan-status');
  statusEl.className = 'scan-status loading';
  statusEl.innerHTML = '<span class="scanning-dots">Label analyseren</span>';
  const [meta, base64] = dataUrl.split(',');
  const mediaType = meta.match(/:(.*?);/)[1];
  const prompt = `Je bent een wijnexpert. Analyseer dit foto van een wijnlabel en retourneer ALLEEN een JSON object (geen markdown, geen uitleg, puur JSON):\n{\n  "naam": "volledige naam van de wijn",\n  "wijnhuis": "naam van de producent",\n  "jaar": "vintage jaar als string of lege string",\n  "regio": "regio en land, bijv. Barolo DOCG, Piemonte, Italië",\n  "druivenras": "druivenras(sen)",\n  "type": "één van: Rood, Wit, Rosé, Mousserend, Zoet (wit), Zoet (rood), Zoet / Mousserend",\n  "smaakprofiel": "kort smaakprofiel op basis van bekende kennis",\n  "spijscombinaties": "geschikte spijscombinaties"\n}`;
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 1000,
        messages: [{role: 'user', content: [
          {type: 'image', source: {type: 'base64', media_type: mediaType, data: base64}},
          {type: 'text', text: prompt}
        ]}]
      })
    });
    const data = await response.json();
    const text = data.content.map(c => c.text||'').join('');
    const wine = JSON.parse(text.replace(/```json|```/g,'').trim());
    if (wine.naam) document.getElementById('f-naam').value = wine.naam;
    if (wine.wijnhuis) document.getElementById('f-wijnhuis').value = wine.wijnhuis;
    if (wine.jaar) document.getElementById('f-jaar').value = wine.jaar;
    if (wine.regio) document.getElementById('f-regio').value = wine.regio;
    if (wine.druivenras) document.getElementById('f-druivenras').value = wine.druivenras;
    if (wine.smaakprofiel) document.getElementById('f-smaak').value = wine.smaakprofiel;
    if (wine.spijscombinaties) document.getElementById('f-spijs').value = wine.spijscombinaties;
    if (wine.type) {
      const sel = document.getElementById('f-type');
      for (let opt of sel.options) { if (opt.value === wine.type || opt.text === wine.type) { sel.value = opt.value; break; } }
    }
    statusEl.className = 'scan-status success';
    statusEl.textContent = '✓ Label herkend — controleer en pas aan indien nodig';
  } catch(e) {
    statusEl.className = 'scan-status error';
    statusEl.textContent = '✗ Herkenning mislukt — vul handmatig in';
  }
}

// ── STATS ──────────────────────────────────────────────────────────────
function renderStatsTab() {
  const total = wines.length;
  const bottles = wines.reduce((s,w) => s+(parseInt(w.flessen)||1),0);
  const typeCounts = {}, locCounts = {}, regioCounts = {};
  wines.forEach(w => {
    const tc = getTypeClass(w.type)||w.type||'Onbekend';
    typeCounts[tc] = (typeCounts[tc]||0)+1;
    const l = w.locatie||'Onbekend'; locCounts[l] = (locCounts[l]||0)+1;
    if (w.regio) { const key = w.regio.split(',').pop().trim().replace(/\(.*\)/,'').trim(); regioCounts[key] = (regioCounts[key]||0)+1; }
  });
  const typeColors = {Rood:'#d4645a',Wit:'#c8b97a',Rosé:'#d4807a',Mousserend:'#8ab4cc',Zoet:'#9a7ab4'};
  document.getElementById('stats-cards').innerHTML = `
    <div class="stat-card"><div class="stat-card-num">${total}</div><div class="stat-card-label">Wijnen totaal</div></div>
    <div class="stat-card"><div class="stat-card-num">${bottles}</div><div class="stat-card-label">Flessen totaal</div></div>
    <div class="stat-card"><div class="stat-card-num">${typeCounts['Rood']||0}</div><div class="stat-card-label">Rode wijnen</div></div>
    <div class="stat-card"><div class="stat-card-num">${typeCounts['Wit']||0}</div><div class="stat-card-label">Witte wijnen</div></div>
    <div class="stat-card"><div class="stat-card-num">${typeCounts['Rosé']||0}</div><div class="stat-card-label">Rosé wijnen</div></div>
    <div class="stat-card"><div class="stat-card-num">${typeCounts['Zoet']||0}</div><div class="stat-card-label">Zoete wijnen</div></div>`;
  const maxType = Math.max(...Object.values(typeCounts),1);
  document.getElementById('chart-type').innerHTML = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="bar-row"><div class="bar-label">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxType*100).toFixed(1)}%;background:${typeColors[k]||'#7a6e64'}"></div></div><div class="bar-count">${v}</div></div>`).join('');
  const locE = Object.entries(locCounts).sort((a,b)=>b[1]-a[1]); const maxL = Math.max(...locE.map(e=>e[1]),1);
  document.getElementById('chart-locatie').innerHTML = locE.map(([k,v])=>`<div class="bar-row"><div class="bar-label">${k.replace('Liebherr – ','')}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxL*100).toFixed(1)}%;background:var(--gold)"></div></div><div class="bar-count">${v}</div></div>`).join('');
  const topR = Object.entries(regioCounts).sort((a,b)=>b[1]-a[1]).slice(0,12); const maxR = Math.max(...topR.map(e=>e[1]),1);
  document.getElementById('chart-regio').innerHTML = topR.map(([k,v])=>`<div class="bar-row"><div class="bar-label">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxR*100).toFixed(1)}%;background:var(--gold2)"></div></div><div class="bar-count">${v}</div></div>`).join('');
}

function switchTab(name) {
  ['collectie','toevoegen','statistieken'].forEach(t => document.getElementById('tab-'+t).style.display = t===name?'block':'none');
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active',['collectie','toevoegen','statistieken'][i]===name));
  if (name==='statistieken') renderStatsTab();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}


init();
